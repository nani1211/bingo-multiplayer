  - heading "Help & FAQ" [level=1] [ref=e8]
  - paragraph [ref=e9]: Everything you need to know to play Bingo Multiplayer
  - heading "🚀 Getting Started" [level=2] [ref=e10]
  - paragraph [ref=e11] [cursor=pointer]: Q How do I join a game?
  - paragraph [ref=e12]:
    - text: You need a
    - strong [ref=e13]: room code
    - text: from the person who created the game (the host). On the home screen, enter your name and the 6-character room code, then tap
    - emphasis [ref=e14]: Join Game →
    - text: . No account required!
  - paragraph [ref=e15] [cursor=pointer]: Q Do I need to create an account?
  - paragraph [ref=e16]:
    - text: No. You can play as a guest — just pick a fun name (or use the 🎲 random button) and enter the room code. If you want to
    - strong [ref=e17]: create your own rooms
    - text: and host games, you need to sign in with Google or an email/password.
  - paragraph [ref=e18] [cursor=pointer]: Q What is a room code?
  - paragraph [ref=e19]:
    - text: A room code is a 6-character code (letters and numbers, e.g.
    - code [ref=e20]: BK4R7Z
    - text: ) that the host shares with friends to invite them into a private game. Rooms are invite-only — nobody can stumble into your game without the code.
