  - heading "💡 Playing Tips" [level=2] [ref=e100]
  - paragraph [ref=e101] [cursor=pointer]: Q What are the gold glowing numbers on my board?
  - paragraph [ref=e102]: Gold-glowing cells show numbers that have been called but you haven't marked yet. Tap them to mark! You can toggle this highlight on/off with the 💡 button in the game header.
  - paragraph [ref=e103] [cursor=pointer]: Q What are the blue glowing numbers? (Classic mode)
  - paragraph [ref=e104]:
    - text: Blue-glowing cells appear on the
    - emphasis [ref=e105]: caller's
    - text: board in Classic mode. They are numbers that haven't been called yet — tap one to call it as the next number!
  - paragraph [ref=e106] [cursor=pointer]: Q Can I mark a number that hasn't been called?
  - paragraph [ref=e107]: No. If you tap a number that hasn't been called, the cell briefly flashes red to let you know. Only called numbers can be marked.
  - paragraph [ref=e108] [cursor=pointer]: Q How do I know whose turn it is?
  - paragraph [ref=e109]:
    - text: The top bar shows the current caller's name. When it's your turn, it says
    - emphasis [ref=e110]: "\"Your turn to call!\""
    - text: in gold. The timer counts down how long you have.
  - heading "🔧 Troubleshooting" [level=2] [ref=e111]
  - paragraph [ref=e112] [cursor=pointer]: Q I entered the room code but got "Room not found"
  - list [ref=e113]:
    - listitem [ref=e114]: Double-check the code — it's case-insensitive but must be the right 6 characters.
    - listitem [ref=e115]: Room codes use only unambiguous characters (no zero/O, no one/I/L confusion).
    - listitem [ref=e116]: Ask the host to confirm the code shown in their game header.
    - listitem [ref=e117]: The room must still be in "waiting" status — if the game started, you can't join.
  - paragraph [ref=e118] [cursor=pointer]: Q The game says "That room already started"
  - paragraph [ref=e119]: Rooms only accept new players before the host taps Start. Ask the host to create a new room for you to join before the game begins.
  - paragraph [ref=e120] [cursor=pointer]: Q I refreshed the page and lost my game
  - generic [ref=e121]: "⚠️ Guests: refreshing the page ends your session. You'll need to get a new code and rejoin (if the game hasn't started). Registered users stay logged in after a refresh but may need to re-navigate to the game."
  - paragraph [ref=e122] [cursor=pointer]: Q Other players are missing from the player list
  - paragraph [ref=e123]: The player list updates in real time. If someone's name is missing, they may not have joined yet, or there may be a short sync delay. Wait a few seconds and it should update.
  - paragraph [ref=e124] [cursor=pointer]: Q The game is stuck / Start button doesn't work
  - list [ref=e125]:
    - listitem [ref=e126]: Only the host (room creator) can start the game.
    - listitem [ref=e127]: Make sure at least one player has joined.
    - listitem [ref=e128]: If there's a connection issue, try leaving and re-creating the room.
  - paragraph [ref=e129] [cursor=pointer]: Q What happens if the host leaves?
  - paragraph [ref=e130]: If the host leaves mid-game, the game will continue until a winner is found in Auto mode (numbers stop being called), or stall in Turn/Classic mode (no one can advance the turn). For best results, the host should stay until the game ends.
  - heading "📱 Device Support" [level=2] [ref=e131]
  - paragraph [ref=e132]: Bingo Multiplayer works in any modern browser on phones, tablets, and desktops. No app download required. Chrome, Safari, Firefox, and Edge are all supported. JavaScript must be enabled.
