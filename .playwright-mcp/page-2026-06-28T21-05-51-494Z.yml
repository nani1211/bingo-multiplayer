  - heading "🎮 Game Modes" [level=2] [ref=e43]
  - generic [ref=e44]:
    - generic [ref=e45]:
      - heading "⏱ Auto Auto Mode" [level=3] [ref=e46]:
        - generic [ref=e47]: ⏱ Auto
        - text: Auto Mode
      - paragraph [ref=e48]: Numbers are called automatically every 8 seconds. No one needs to do anything — just watch and mark your card. Great for large groups or casual play.
    - generic [ref=e49]:
      - heading "👆 Turn Turn Mode" [level=3] [ref=e50]:
        - generic [ref=e51]: 👆 Turn
        - text: Turn Mode
      - paragraph [ref=e52]:
        - text: Players take turns calling numbers in a round-robin rotation. When it's your turn, a
        - strong [ref=e53]: 📣 Call!
        - text: button appears. The system picks a random number for you. If you don't call in 15 seconds, the host auto-calls for you.
    - generic [ref=e54]:
      - heading "🎯 Classic Classic Mode" [level=3] [ref=e55]:
        - generic [ref=e56]: 🎯 Classic
        - text: Classic Mode
      - paragraph [ref=e57]:
        - text: Like a real bingo hall. The caller picks a number by
        - strong [ref=e58]: tapping it on their own board
        - text: (blue glowing cells). Numbers 1–25 are used (no B-I-N-G-O columns). Takes turns round-robin style.
  - heading "🥇 Who Calls First? (Turn & Classic modes)" [level=2] [ref=e59]
  - paragraph [ref=e60] [cursor=pointer]: Q Random
  - paragraph [ref=e61]: The app randomly shuffles all players and assigns a calling order.
  - paragraph [ref=e62] [cursor=pointer]: Q Rock Paper Scissors (RPS)
  - paragraph [ref=e63]: All players choose 🪨 Rock, 📄 Paper, or ✂️ Scissors (15-second window). The winner calls first; losers follow. On a tie, everyone plays again. If you don't pick in time, a random choice is made for you.
