<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="description" content="Free multiplayer bingo game — no account needed. Share a room code and play with friends anywhere."/>
  <title>Bingo Multiplayer</title>
  <link rel="stylesheet" href="/src/style.css"/>
</head>
<body>
<div id="app">

  <!-- ── Auth ──────────────────────────────────── -->
  <div id="screen-auth" class="screen active">
    <h1>🎱 Bingo</h1>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="guest">🎲 Guest</button>
      <button class="auth-tab" data-tab="signin">🔐 Sign In</button>
    </div>

    <!-- Guest panel -->
    <div id="auth-panel-guest" class="auth-panel active">
      <p class="auth-hint">No account needed — pick a fun name and enter the room code!</p>
      <div class="name-row">
        <input id="guest-name" type="text" placeholder="Your name" maxlength="24" autocomplete="off" spellcheck="false"/>
        <button id="btn-random-name" class="btn-ghost btn-icon" title="Pick a random name">🎲</button>
      </div>
      <input id="guest-room-code" type="text" placeholder="Room code (from host)" maxlength="6" autocomplete="off" spellcheck="false"/>
      <!-- Age confirmation — required before joining -->
      <label class="age-check">
        <input type="checkbox" id="age-confirm-guest"/>
        <span>I am 13 or older. If under 18, I have parental or guardian permission.
          <a href="/terms.html" target="_blank">Terms</a></span>
      </label>
      <button id="btn-guest-join">Join Game →</button>
      <p id="guest-error" class="error"></p>
    </div>

    <!-- Sign in panel -->
    <div id="auth-panel-signin" class="auth-panel">
      <button id="btn-google-login">Sign in with Google</button>
      <div class="divider">or</div>
      <input id="input-email" type="email" placeholder="Email" autocomplete="email"/>
      <input id="input-password" type="password" placeholder="Password" autocomplete="current-password"/>
      <button id="btn-email-login">Sign In</button>
      <button id="btn-email-signup">Sign Up</button>
      <p class="age-note">By signing in you confirm you are 13 or older (or have parental consent if under 18).</p>
      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <!-- ── Lobby ─────────────────────────────────── -->
  <div id="screen-lobby" class="screen">
    <header>
      <h1>🎱 Bingo</h1>
      <span id="user-display-name"></span>
      <button id="btn-logout" class="btn-ghost">Sign Out</button>
    </header>

    <div class="create-panel">
      <div class="create-row">
        <span class="label">Mode</span>
        <div class="toggle-group" id="mode-toggle">
          <button class="toggle active" data-val="auto">⏱ Auto</button>
          <button class="toggle" data-val="manual">👆 Turn</button>
          <button class="toggle" data-val="classic25">🎯 Classic</button>
        </div>
      </div>
      <div class="create-row">
        <span class="label">Win rule</span>
        <select id="win-pattern-select"></select>
      </div>
      <!-- Only shown for Turn / Classic modes -->
      <div class="create-row" id="turn-order-row" style="display:none">
        <span class="label">1st caller</span>
        <div class="toggle-group" id="turn-order-toggle">
          <button class="toggle active" data-val="random">🎲 Random</button>
          <button class="toggle" data-val="rps">🪨 RPS</button>
        </div>
      </div>
      <button id="btn-create-room">+ Create Room</button>
    </div>

    <!-- Join by code -->
    <div class="join-code-row">
      <input id="input-room-code" type="text" placeholder="Room code" maxlength="6" autocomplete="off" spellcheck="false"/>
      <button id="btn-join-code">Join</button>
    </div>
    <p id="code-error" class="error"></p>

  </div>

  <!-- ── Game ──────────────────────────────────── -->
  <div id="screen-game" class="screen">
    <header>
      <button id="btn-leave-room" class="btn-ghost">← Leave</button>
      <span id="game-room-id"></span>
      <button id="btn-highlight-toggle" class="btn-ghost btn-icon" title="Toggle number highlight">💡</button>
      <span id="game-badges"></span>
    </header>

    <!-- Top bar: current number / timer / action -->
    <div class="top-bar">
      <div class="current-wrap">
        <div class="current-label">Called</div>
        <div id="current-number">—</div>
      </div>
      <div class="mid-wrap">
        <div id="turn-indicator"></div>
        <div id="timer"></div>
      </div>
      <div class="action-wrap">
        <button id="btn-start-game"  style="display:none">Start</button>
        <button id="btn-call-number" style="display:none">📣 Call!</button>
      </div>
    </div>

    <!-- Called numbers history -->
    <div>
      <div class="section-label">Numbers called</div>
      <div id="called-numbers"></div>
    </div>

    <!-- Win pattern hint -->
    <div id="win-hint" class="win-hint"></div>

    <!-- Card column labels -->
    <div class="card-header" id="card-header">
      <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
    </div>
    <div id="bingo-card"></div>

    <div id="players-list"></div>
    <p id="game-message"></p>

    <!-- ── RPS Overlay ─────────────────────────── -->
    <div id="rps-overlay" style="display:none">
      <div class="rps-box">
        <div id="rps-title">🪨 Rock Paper Scissors</div>
        <div id="rps-round-label"></div>
        <div id="rps-timer-display"></div>
        <div class="rps-choices">
          <button class="rps-btn" id="rps-rock">🪨<br>Rock</button>
          <button class="rps-btn" id="rps-paper">📄<br>Paper</button>
          <button class="rps-btn" id="rps-scissors">✂️<br>Scissors</button>
          <button class="rps-btn rps-random" id="rps-random-btn">🎲<br>Random</button>
        </div>
        <div id="rps-status"></div>
        <div id="rps-player-list"></div>
      </div>
    </div>

  </div><!-- /screen-game -->

  <!-- Footer inside #app so it sits below the active screen, not beside it -->
  <footer id="app-footer">
    <a href="/privacy.html" target="_blank">Privacy Policy</a>
    <span>·</span>
    <a href="/terms.html" target="_blank">Terms</a>
    <span>·</span>
    <a href="/faq.html" target="_blank">Help &amp; FAQ</a>
  </footer>

</div><!-- /app -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
